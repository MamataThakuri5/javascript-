<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    
  <title>random quote generator</title>
  <style>
    body{
      background-color:rgb(239, 231, 231);
    }
   #quote{
    transition:opacity 0.5s;
   }
   .fade{
    opacity:0;
   }
   
  </style>
  </head>
  <body>
    <p id="quote">Click the button to get a quote</p>
    <p id="auther">Unknow</p>
    <button onclick="newQuote()">New Quote</button>
  </body>
  <script>
    let quotes=[
    {text:"keep going!", auther:"winston churchill"},
    {text:"Believe in god and yourself!", auther:"mamata"},
    {text:"Never give up", auther:"nelson mandela"},
    {text:"failure is the key of the success", auther:"unknow"},
    ];
    function newQuote(){
    // picks a random number between 0 and quotes length
    let random=Math.floor(Math.random()*quotes.length);
    let picked=quotes[random];// use that number to pick a quote

    //fade out the old quote
    let quote=document.getElementById("quote");
    quote.classList.add("fade");

    // wait 1s then change text and fade in
    setTimeout(()=>{
      quote.textContent=picked.text;
      document.getElementById("auther").textContent="-"+picked.auther;
      quote.classList.remove("fade");
    },1000);
  }
  </script>
  </html>

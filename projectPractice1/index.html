<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    
  <title>Emoji mood tracker</title>
  <style>
    body{
      background-color:rgb(239, 231, 231);
    }
   button{
    font-size:30px;
    background:none;
    cursor:pointer;
   } 
   button:hover{
    transform:scale(1.1);
   }
  </style>
  </head>
  <body>
  <h1>How are you feeling?</h1>
  <button onclick="logMood('😊')">😊</button>
  <button onclick="logMood('😔')">😔</button>
  <button onclick="logMood('😭')">😭</button>
  <button onclick="logMood('😂')">😂</button>
  <button onclick="logMood('💃')">💃</button>
  
  <ul id="history"></ul>
  <li id="empty-msg">No mood logged yet! click an emoji</li>
  </body>
    <script>
    function logMood(emoji){
      // get the current time
      let time=new Date().toLocaleTimeString();
      
      // to add item to the list
    let item=document.createElement("li");//create a new list
    item.textContent=emoji + time;
    let history= document.getElementById("history");
     history.prepend(item);
     document.getElementById("empty-msg").style.display="none"; //hiding  empty -msg while clicling the button 
      }
    </script>
    </html>
